services:
  db:
    image: mysql:8.0
    container_name: infrasight-db-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: infrasight
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ${DOCKERHUB_USERNAME:-yuvarajofl}/infrasight-backend:${IMAGE_TAG:-latest}
    container_name: infrasight-backend-prod
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database
      - ./uploads:/app/uploads
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_PORT=3306
      - DB_NAME=infrasight
      - APP_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${DOCKERHUB_USERNAME:-yuvarajofl}/infrasight-frontend:${IMAGE_TAG:-latest}
    container_name: infrasight-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data_prod:
