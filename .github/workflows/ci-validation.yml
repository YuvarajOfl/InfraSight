name: CI Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Frontend Linting
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Install ESLint and Plugins
        run: |
          cd frontend
          npm install --save-dev eslint@8 @typescript-eslint/parser @typescript-eslint/eslint-plugin
          echo '{"root": true, "env": {"browser": true, "es2020": true, "node": true}, "extends": ["eslint:recommended"], "parser": "@typescript-eslint/parser", "rules": {"no-unused-vars": "off", "no-undef": "off", "no-redeclare": "off", "@typescript-eslint/no-unused-vars": "off"}}' > .eslintrc.json

      - name: Run Frontend Lint
        run: |
          cd frontend
          npm run lint

      # Backend Linting
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'

      - name: Install Ruff Linter
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Backend Lint
        run: |
          ruff check backend/ --select=E9,F63,F7,F82

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'

      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Tests
        run: |
          PYTHONPATH=. python -m pytest backend/tests/ -m "not integration"

  build-validation:
    name: Verify Production Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Verify Frontend Build
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies & Build
        run: |
          cd frontend
          npm ci
          npm run build

      # Verify Backend Image Build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Image Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: false
