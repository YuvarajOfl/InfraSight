name: Application Deployment

on:
  workflow_dispatch:

jobs:
  validate-secrets:
    name: Validate Deployment Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check Required GitHub Secrets
        run: |
          error_found=0
          check_secret() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "❌ ERROR: GitHub secret '$name' is missing or empty!"
              error_found=1
            else
              echo "✅ GitHub secret '$name' is configured."
            fi
          }
          echo "Checking deployment secrets..."
          check_secret "AWS_ACCESS_KEY_ID" "${{ secrets.AWS_ACCESS_KEY_ID }}"
          check_secret "AWS_SECRET_ACCESS_KEY" "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          check_secret "DOCKERHUB_USERNAME" "${{ secrets.DOCKERHUB_USERNAME }}"
          check_secret "DOCKERHUB_TOKEN" "${{ secrets.DOCKERHUB_TOKEN }}"
          check_secret "EC2_SSH_KEY" "${{ secrets.EC2_SSH_KEY }}"
          check_secret "JWT_SECRET" "${{ secrets.JWT_SECRET }}"
          check_secret "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"
          check_secret "GOOGLE_CLIENT_ID" "${{ secrets.GOOGLE_CLIENT_ID }}"
          check_secret "GOOGLE_CLIENT_SECRET" "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          check_secret "ADMIN_EMAIL" "${{ secrets.ADMIN_EMAIL }}"
          check_secret "ADMIN_PASSWORD" "${{ secrets.ADMIN_PASSWORD }}"
          if [ $error_found -ne 0 ]; then
            echo "FATAL: Deployment aborted due to missing secrets. Please configure them in your repository settings."
            exit 1
          fi
          echo "All secrets successfully verified!"

  build-and-push:
    name: Build & Push Docker Images
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and Push Backend
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/infrasight-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/infrasight-backend:${{ github.sha }}

      # Build and Push Frontend
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/infrasight-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/infrasight-frontend:${{ github.sha }}

  deploy:
    name: Deploy to Existing EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Fetch EC2 Public IP from AWS
        id: fetch-ip
        run: |
          echo "Fetching running EC2 instance Public IP..."
          EC2_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=InfraSight-ec2-server" "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].PublicIpAddress" \
            --output text | head -n1)
          
          if [ -z "$EC2_IP" ] || [ "$EC2_IP" = "None" ]; then
            echo "❌ ERROR: No running EC2 instance found with tag Name=InfraSight-ec2-server"
            exit 1
          fi
          echo "Found running EC2 Instance at: $EC2_IP"
          echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT

      # SSH Connection Setup
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.EC2_IP }} >> ~/.ssh/known_hosts

      - name: Verify SSH Connection
        run: |
          echo "Verifying SSH connection to EC2..."
          if ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=10 ubuntu@${{ env.EC2_IP }} "echo SSH_CONNECTION_SUCCESS" | grep -q "SSH_CONNECTION_SUCCESS"; then
            echo "SSH_CONNECTION_SUCCESS"
          else
            echo "❌ ERROR: SSH connection to EC2 is unavailable."
            exit 1
          fi

      - name: Verify Remote Directory Structure
        run: |
          echo "Ensuring deployment directory /home/ubuntu/infrasight exists..."
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} "mkdir -p /home/ubuntu/infrasight"

      # Transfer and Deploy Config
      - name: Copy Docker Compose Configuration
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no docker-compose.prod.yml ubuntu@${{ env.EC2_IP }}:/home/ubuntu/infrasight/docker-compose.yml

      - name: Create and Copy Environment Configuration
        run: |
          cat << 'EOF' > .env.prod
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG=latest
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          CORS_ORIGINS=*
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          EOF
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no .env.prod ubuntu@${{ env.EC2_IP }}:/home/ubuntu/infrasight/.env

      - name: Execute Remote Deploy Commands
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} "
            cd /home/ubuntu/infrasight
            
            # Authenticate to Docker Hub
            echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin
            
            echo 'Pulling latest images...'
            docker compose pull
            
            echo 'Stopping current services...'
            docker compose down
            
            echo 'Starting services in detached mode...'
            docker compose up -d
          "

      - name: Verify Deployed Services Health
        run: |
          echo "Waiting for backend service to become healthy..."
          attempt=1
          max_attempts=12
          healthy=false
          while [ $attempt -le $max_attempts ]; do
            response=$(curl -s -w "%{http_code}" -o /dev/null http://${{ env.EC2_IP }}:8000/health || true)
            if [ "$response" = "200" ]; then
              echo "✅ Backend service is healthy!"
              healthy=true
              break
            fi
            echo "Waiting for service (attempt $attempt/$max_attempts, response code: $response)..."
            sleep 5
            attempt=$((attempt+1))
          done
          
          if [ "$healthy" = "false" ]; then
            echo "❌ ERROR: Backend service failed health validation (did not return HTTP 200)."
            echo "=== BACKEND SERVICE LOGS ==="
            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} "cd /home/ubuntu/infrasight && docker compose logs backend --tail=100" || true
            echo "=== DOCKER COMPOSE PROCESS STATUS ==="
            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} "cd /home/ubuntu/infrasight && docker compose ps" || true
            exit 1
          fi

          echo "Checking frontend accessibility..."
          frontend_response=$(curl -s -w "%{http_code}" -o /dev/null http://${{ env.EC2_IP }} || true)
          if [ "$frontend_response" = "200" ]; then
            echo "✅ Frontend web app is accessible!"
          else
            echo "⚠️ WARNING: Frontend web app returned status code $frontend_response."
          fi

          echo "Checking container status..."
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} "
            cd /home/ubuntu/infrasight
            docker compose ps
          "

      # Summarize Run
      - name: Print Deployment Summary
        run: |
          echo "### 🚀 InfraSight Application Successfully Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Web App URL**: http://${{ env.EC2_IP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Swagger Docs**: http://${{ env.EC2_IP }}:8000/docs" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          
          echo "=========================================================="
          echo "🚀 InfraSight Application Successfully Deployed!"
          echo "=========================================================="
          echo "Frontend Web App URL: http://${{ env.EC2_IP }}"
          echo "Backend Swagger Docs: http://${{ env.EC2_IP }}:8000/docs"
          echo "=========================================================="

      - name: Collect Deployment Diagnostics on Failure
        if: failure()
        run: |
          echo "=========================================================="
          echo "❌ DEPLOYMENT FAILURE: Collecting EC2 Diagnostics..."
          echo "=========================================================="
          echo "--- Docker Systemd Service Status ---"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} "systemctl status docker" || true
          echo "--- All Running and Stopped Containers ---"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} "docker ps -a" || true
          echo "--- Docker Compose Container Status ---"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} "cd /home/ubuntu/infrasight && docker compose ps" || true
          echo "--- Docker Compose logs (Last 100 lines) ---"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} "cd /home/ubuntu/infrasight && docker compose logs --tail=100" || true
          echo "=========================================================="
